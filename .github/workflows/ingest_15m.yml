name: Ingest 15m

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    concurrency:
      group: ingest-15m
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Ingest BTC (OHLCV + funding + perp + deriv)
        run: python -m pipeline.ingest_15m --asset BTC
      - name: Ingest ETH (OHLCV + funding + perp + deriv)
        run: python -m pipeline.ingest_15m --asset ETH
      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "data(15m): $(date -u +%FT%TZ)"
            git push
          fi
