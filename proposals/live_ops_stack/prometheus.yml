global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    project: btc-forecast
    env: paper-testnet

# Sem alertmanager no MVP (kill_switch + drift_watchdog mandam Telegram diretos).
# Quando crescer: adicionar alertmanager + rules em /etc/prometheus/rules.

scrape_configs:
  - job_name: predictor
    metrics_path: /metrics
    static_configs:
      - targets: ['predictor:8080']
        labels: { service: predictor }

  - job_name: drift_watchdog
    metrics_path: /metrics
    static_configs:
      - targets: ['drift_watchdog:9101']
        labels: { service: drift_watchdog }

  - job_name: prometheus_self
    static_configs:
      - targets: ['localhost:9090']

  # executor/kill_switch expõem metrics? MVP: não, apenas logs JSON via Loki.
  # Quando virar prod: adicionar pushgateway ou /metrics inline.
