server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: btc_forecast_json
    static_configs:
      - targets: [localhost]
        labels:
          job: btc-forecast
          __path__: /logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            event: event
            ts: timestamp
      - labels:
          level:
          service:
      - timestamp:
          source: ts
          format: RFC3339Nano
